name: App Android Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - preview
          - production
  push:
    tags:
      - 'app-v*'

concurrency:
  group: app-android-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: eas-build / android / ${{ inputs.profile || 'production' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify EXPO_TOKEN is set
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN secret is not set. See packages/app/EAS.md."
            exit 1
          fi

      - name: Run EAS build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: bunx eas build --platform android --profile ${{ inputs.profile || 'production' }} --non-interactive
        working-directory: packages/app
