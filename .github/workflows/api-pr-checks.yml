name: PR Checks

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
    paths:
      - 'packages/api/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  pull-requests: write

jobs:
  setup:
    name: setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  check-api:
    name: check-api
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-api
      cancel-in-progress: false
    steps:
      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          database: loyaltyhive
          role: loyaltyhive_api

      - name: Set DATABASE_URL
        run: echo "DATABASE_URL=${{ steps.create-branch.outputs.db_url_pooled }}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Migrations
        run: bun run db:migrate
        working-directory: packages/api

      - name: Post Schema Diff to PR
        uses: neondatabase/schema-diff-action@v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          compare_branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          database: loyaltyhive

      - name: Run lint
        run: bun run lint
        working-directory: packages/api

      - name: Run typecheck
        run: bun run typecheck
        working-directory: packages/api

      - name: Run test
        run: LIB_VERSION=$(npm run -s prebuild) bun test --preload ./test/setup.ts --coverage-reporter=lcov
        working-directory: packages/api

      - name: Load coverage thresholds
        id: coverage-thresholds
        working-directory: packages/api
        run: |
          bun -e "
            const { test: t } = Bun.TOML.parse(await Bun.file('bunfig.toml').text());
            console.log('lines=' + t.coverageThresholds.lines);
            console.log('functions=' + t.coverageThresholds.functions);
          " >> "$GITHUB_OUTPUT"

      - name: Enforce function coverage threshold
        working-directory: packages/api
        run: |
          MIN="${{ steps.coverage-thresholds.outputs.functions }}"
          RATE=$(bun -e "
            let fnf = 0, fnh = 0;
            for (const line of await Bun.file('coverage/lcov.info').text().then((t) => t.split('\n'))) {
              if (line.startsWith('FNF:')) fnf += Number(line.slice(4));
              if (line.startsWith('FNH:')) fnh += Number(line.slice(4));
            }
            console.log(fnf ? ((fnh / fnf) * 100).toFixed(2) : '100.00');
          ")
          echo "Function coverage: ${RATE}% (minimum ${MIN}%)"
          awk -v rate="$RATE" -v min="$MIN" 'BEGIN { exit (rate + 0 >= min + 0 ? 0 : 1) }' \
            || { echo "::error::Function coverage ${RATE}% is below minimum ${MIN}%"; exit 1; }

      - name: Report coverage on PR
        uses: mcclurejt/cover-2@1.0.1
        with:
          head-lcov-file: coverage/lcov.info
          comment-header: api-coverage
          thresholds: ${{ steps.coverage-thresholds.outputs.lines }} 100
          fail-below-threshold: true
          show-function-coverage: true
          working-directory: packages/api

  delete-neon-branch:
    name: delete-neon-branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
